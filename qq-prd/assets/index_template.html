<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>商品限购策略 - 最终版PRD与原型主控</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --border:#e4e7ed; --bg:#fff; --fg:#1f2329; --primary:#ff7d00; }
    html, body { height: 100%; }
    body { margin:0; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; color:var(--fg); background:var(--bg); }
    .header { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); background:#f9fafb; position:sticky; top:0; z-index:10; }
    .title { font-size:18px; font-weight:600; }
    .main { display:flex; height: calc(100% - 56px); }
    .left { width:50%; height:100%; border-right:1px solid var(--border); box-sizing:border-box; }
    .right { width:50%; height:100%; box-sizing:border-box; }
    .frame { width:100%; height:100%; border:0; }
    .split { width:8px; cursor:col-resize; background:linear-gradient(to right, transparent, #f0f0f0, transparent); }
    .controls { margin-left:auto; display:flex; align-items:center; gap:8px; }
    .badge { display:inline-block; padding:2px 8px; border:1px solid var(--border); border-radius:12px; font-size:12px; color:#909399; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">商品限购策略 - PRD 与 原型</span>
    <span class="badge">左右平分/可调整</span>
    <div class="controls">
      <label>版本</label>
      <select id="versionSelect">
        <option value="v1.4" selected>v1.4</option>
        <option value="v1.3">v1.3</option>
        <option value="v1.2">v1.2</option>
        <option value="v1.1">v1.1</option>
        <option value="v1.0">v1.0</option>
      </select>
      <label>右侧宽度</label>
      <input id="rightWidth" type="range" min="30" max="70" value="50">
      <span id="rightWidthLabel">50%</span>
    </div>
  </div>
  <div class="main">
    <div class="left">
      <iframe id="prdFrame" class="frame" src="prd_template.html"></iframe>
    </div>
    <div class="split" id="splitter" title="拖动调整左右宽度"></div>
    <div class="right">
      <iframe id="protoFrame" class="frame" src="admin_prototype_template.html"></iframe>
    </div>
  </div>
  <script>
    const versionSelect = document.getElementById('versionSelect');
    const prdFrame = document.getElementById('prdFrame');
    const protoFrame = document.getElementById('protoFrame');
    const rightWidthRange = document.getElementById('rightWidth');
    const rightWidthLabel = document.getElementById('rightWidthLabel');
    const leftPane = document.querySelector('.left');
    const rightPane = document.querySelector('.right');
    const splitter = document.getElementById('splitter');

    function setVersion(v) {
      if (v === 'v1.0') {
        prdFrame.src = 'prd/prd_v1.0.html';
        protoFrame.src = 'prototype/prototype_v1.0.html#strategy/list';
      } else if (v === 'v1.1') {
        prdFrame.src = 'prd/prd_v1.1.html';
        protoFrame.src = 'prototype/prototype_v1.1.html#strategy/list';
      } else if (v === 'v1.2') {
        prdFrame.src = 'prd/prd_v1.2.html';
        protoFrame.src = 'prototype/prototype_v1.1.html#strategy/list';
      } else if (v === 'v1.3') {
        prdFrame.src = 'prd/prd_v1.4.html';
        protoFrame.src = 'prototype/prototype_v1.3.html#strategy/list';
      } else {
        prdFrame.src = 'prd/prd_v1.4.html';
        protoFrame.src = 'prototype/prototype_v1.4.html#strategy/list';
      }
    }
    versionSelect.addEventListener('change', (e) => setVersion(e.target.value));

    function setRightWidth(percent) {
      percent = Math.max(30, Math.min(70, percent));
      rightWidthLabel.textContent = percent + '%';
      rightPane.style.width = percent + '%';
      leftPane.style.width = (100 - percent) + '%';
    }
    rightWidthRange.addEventListener('input', (e) => setRightWidth(parseInt(e.target.value, 10)));
    setRightWidth(parseInt(rightWidthRange.value, 10));

    let dragging = false;
    splitter.addEventListener('mousedown', () => { dragging = true; });
    window.addEventListener('mouseup', () => { dragging = false; });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const rect = document.querySelector('.main').getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percentRight = Math.round(((rect.width - x) / rect.width) * 100);
      setRightWidth(percentRight);
      rightWidthRange.value = percentRight;
    });

    window.addEventListener('message', (e) => {
      const data = e.data || {};
      if (data.type === 'prd-focus') {
        const base = protoFrame.src.split('?')[0];
        const hash = data.hash || '';
        protoFrame.src = base + '?focus=' + encodeURIComponent(data.id || '') + hash;
      }
    });

    prdFrame.addEventListener('load', () => {});
  </script>
</body>
</html>
