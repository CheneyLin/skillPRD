<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子吧唧 2 期 - ADMIN 运营后台</title>
    <link href="../../assets/bootstrap.main.css" rel="stylesheet">
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            color: #171717;
        }
        
        .sidebar {
            width: 262px;
            background: #171717;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .sidebar-logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 15px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 24px;
            letter-spacing: -0.32px;
        }
        
        .sidebar-menu {
            padding: 16px 0;
        }
        
        .menu-group-title {
            padding: 10px 24px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }
        
        .menu-item {
            padding: 12px 24px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.15s ease;
            font-size: 14px;
            font-weight: 500;
            border-left: 2px solid transparent;
        }
        
        .menu-item:hover {
            background: rgba(255,255,255,0.06);
            color: #ffffff;
        }
        
        .menu-item.active {
            background: rgba(255,255,255,0.08);
            color: #ffffff;
            border-left-color: #ffffff;
        }
        
        .menu-item i { 
            font-size: 18px;
            width: 18px;
            opacity: 0.8;
        }
        
        .main-content {
            margin-left: 262px;
            flex: 1;
            min-height: 100vh;
            background: #ffffff;
        }
        
        .main-content iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-shop"></i>
            <span style="margin-left: 8px;">电子吧唧管理</span>
        </div>
        <div class="sidebar-menu">
            <div class="menu-group-title">IP 包管理</div>
            <div class="menu-item active" data-page="ip_manage.html" onclick="loadPage('ip_manage.html', this)">
                <i class="bi bi-list-ul"></i>
                <span>IP 包列表</span>
            </div>
            
            <div class="menu-group-title" style="margin-top: 20px;">订单管理</div>
            <div class="menu-item" data-page="order_manage.html" onclick="loadPage('order_manage.html', this)">
                <i class="bi bi-file-earmark-text"></i>
                <span>订单列表</span>
            </div>
        </div>
    </div>
    
    <!-- Main Content Area with iframe -->
    <div class="main-content">
        <iframe id="adminFrame" src="admin_pages/ip_manage.html" frameborder="0"></iframe>
    </div>

    <script>
        let currentPage = 'ip_manage.html';
        
        // 加载页面函数
        function loadPage(pageUrl, element) {
            currentPage = pageUrl;
            const frame = document.getElementById('adminFrame');
            frame.src = `admin_pages/${pageUrl}`;
            
            // 更新菜单激活状态
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (element) {
                element.classList.add('active');
            } else {
                // 如果没有传入 element，根据 pageUrl 查找
                const menuItem = document.querySelector(`[data-page="${pageUrl}"]`);
                if (menuItem) {
                    menuItem.classList.add('active');
                }
            }
            
            // 更新 URL hash
            window.location.hash = pageUrl;
        }
        
        // 监听来自子页面的导航消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'PAGE_NAVIGATION') {
                const targetPage = event.data.page;
                const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                if (menuItem) {
                    loadPage(targetPage, menuItem);
                }
            }
        });
        
        // 监听来自父窗口的高亮消息（PRD 联动）
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'highlight' && event.data.featureId) {
                const featureId = event.data.featureId;
                
                // 映射 featureId 到页面
                let targetPage = null;
                if (featureId.startsWith('admin_ip_manage')) {
                    targetPage = 'ip_manage.html';
                } else if (featureId.startsWith('admin_order_manage')) {
                    targetPage = 'order_manage.html';
                }
                
                if (targetPage) {
                    // 切换到对应页面
                    const menuItem = document.querySelector(`[data-page="${targetPage}"]`);
                    if (menuItem) {
                        loadPage(targetPage, menuItem);
                        
                        // 转发高亮消息到 iframe
                        setTimeout(() => {
                            const frame = document.getElementById('adminFrame');
                            if (frame && frame.contentWindow) {
                                frame.contentWindow.postMessage({
                                    action: 'highlight',
                                    featureId: featureId
                                }, '*');
                            }
                        }, 300);
                    }
                }
            }
        });
        
        // 处理 URL hash 变化
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });
        
        // 页面加载时检查 hash
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const menuItem = document.querySelector(`[data-page="${hash}"]`);
                if (menuItem) {
                    loadPage(hash, menuItem);
                }
            }
        });
    </script>
</body>
</html>
