<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 包管理 - 电子吧唧 ADMIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .card-body { padding: 20px; }
        .table { margin-bottom: 0; }
        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }
        .table td { vertical-align: middle; }
        .badge-active { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .badge-inactive { background: #fff2e8; color: #fa8c16; border: 1px solid #ffd591; }
        .badge-soldout { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }
        .btn-action {
            padding: 4px 12px;
            font-size: 13px;
            border-radius: 4px;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        .filter-bar input { width: 200px; }
    </style>
</head>
<body>
    <!-- IP 包管理页面 -->
    <div class="page-header">
        <div class="page-title">IP 包管理</div>
        <button class="btn btn-primary" onclick="navigateToPage('ip_edit.html')">
            <i class="bi bi-plus-lg"></i> 新增 IP 包
        </button>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="filter-bar">
                <input type="text" placeholder="搜索 IP 包名称">
                <select class="form-select" style="width: 150px;">
                    <option value="">全部状态</option>
                    <option value="1">已上架</option>
                    <option value="0">已下架</option>
                </select>
                <button class="btn btn-primary">查询</button>
                <button class="btn btn-outline-secondary">重置</button>
            </div>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header">IP 包列表</div>
        <div class="card-body" style="padding: 0;">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>IP 包 ID</th>
                        <th>IP 名称</th>
                        <th>图片数量</th>
                        <th>SSR 库存</th>
                        <th>SR 库存</th>
                        <th>状态</th>
                        <th>上架时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1001</td>
                        <td>初音未来 2024</td>
                        <td>20</td>
                        <td>85/100</td>
                        <td>320/500</td>
                        <td><span class="badge badge-active">已上架</span></td>
                        <td>2026-04-01</td>
                        <td>
                            <button class="btn btn-outline-primary btn-action" onclick="navigateToPage('ip_edit.html')">编辑</button>
                            <button class="btn btn-outline-danger btn-action">下架</button>
                        </td>
                    </tr>
                    <tr>
                        <td>1002</td>
                        <td>原神 雷电将军</td>
                        <td>15</td>
                        <td>100/100</td>
                        <td>500/500</td>
                        <td><span class="badge badge-active">已上架</span></td>
                        <td>2026-04-05</td>
                        <td>
                            <button class="btn btn-outline-primary btn-action" onclick="navigateToPage('ip_edit.html')">编辑</button>
                            <button class="btn btn-outline-danger btn-action">下架</button>
                        </td>
                    </tr>
                    <tr>
                        <td>1003</td>
                        <td>鬼灭之刃 限定</td>
                        <td>25</td>
                        <td>0/50</td>
                        <td>0/300</td>
                        <td><span class="badge badge-soldout">已售罄</span></td>
                        <td>2026-03-20</td>
                        <td>
                            <button class="btn btn-outline-primary btn-action" onclick="navigateToPage('ip_edit.html')">编辑</button>
                            <button class="btn btn-outline-secondary btn-action">下架</button>
                        </td>
                    </tr>
                    <tr>
                        <td>1004</td>
                        <td>咒术回战 五条悟</td>
                        <td>18</td>
                        <td>-</td>
                        <td>-</td>
                        <td><span class="badge badge-inactive">已下架</span></td>
                        <td>2026-03-01</td>
                        <td>
                            <button class="btn btn-outline-primary btn-action" onclick="navigateToPage('ip_edit.html')">编辑</button>
                            <button class="btn btn-outline-success btn-action">上架</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div style="display: flex; justify-content: center; margin-top: 20px;">
        <nav>
            <ul class="pagination">
                <li class="page-item"><a class="page-link" href="#">上一页</a></li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#">下一页</a></li>
            </ul>
        </nav>
    </div>

    <script>
        // 页面导航函数
        function navigateToPage(pageUrl) {
            window.parent.postMessage({
                type: 'PAGE_NAVIGATION',
                page: pageUrl
            }, '*');
        }
    </script>
</body>
</html>
