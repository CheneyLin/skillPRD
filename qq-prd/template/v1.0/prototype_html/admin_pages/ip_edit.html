<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 包编辑 - 电子吧唧 ADMIN</title>
    <link href="../../assets/bootstrap.main.css" rel="stylesheet">
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .card-body { padding: 20px; }
        .tabs {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 24px;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #1677ff;
            border-bottom-color: #1677ff;
            font-weight: 600;
        }
        .probability-config {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 8px;
        }
        .probability-item {
            display: grid;
            grid-template-columns: 120px 1fr 1fr;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
        }
        .probability-label {
            font-weight: 600;
            color: #333;
        }
        .level-ssr { color: #ff4d4f; }
        .level-sr { color: #fa8c16; }
        .level-r { color: #52c41a; }
        .upload-area {
            border: 2px dashed #d9d9d9;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #1677ff;
            background: #f8f9ff;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .image-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 2px solid transparent;
        }
        .image-item.selected {
            border-color: #1677ff;
        }
        .image-item-bg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .image-level-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: white;
        }
    </style>
</head>
<body>
    <!-- IP 包编辑页面 -->
    <div class="page-header">
        <div class="page-title">编辑 IP 包 - 初音未来 2024</div>
        <div>
            <button class="btn btn-outline-secondary" onclick="navigateToPage('ip_manage.html')">取消</button>
            <button class="btn btn-primary">保存</button>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="tabs">
                <div class="tab active">基本信息</div>
                <div class="tab">图片库管理</div>
                <div class="tab">概率与库存</div>
                <div class="tab">整包配置</div>
            </div>

            <div class="mb-4">
                <h6 style="font-weight: 600; margin-bottom: 16px; color: #333; padding-left: 12px; border-left: 3px solid #1677ff;">基本信息</h6>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label"><span class="text-danger">*</span> IP 名称</label>
                        <input type="text" class="form-control" value="初音未来 2024">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label"><span class="text-danger">*</span> 封面图</label>
                        <div class="upload-area" style="padding: 20px;">
                            <div style="font-size: 48px; margin-bottom: 12px;">📷</div>
                            <div style="color: #666; font-size: 14px;">点击上传封面图</div>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">简介</label>
                    <textarea class="form-control" rows="3">全新初音未来系列吧唧，包含 20 张精美图片，涵盖 SSR/SR/R 三个等级。</textarea>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label"><span class="text-danger">*</span> 上架时间</label>
                        <input type="datetime-local" class="form-control" value="2026-04-01T00:00">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label"><span class="text-danger">*</span> 下架时间</label>
                        <input type="datetime-local" class="form-control" value="2026-06-30T23:59">
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h6 style="font-weight: 600; margin-bottom: 16px; color: #333; padding-left: 12px; border-left: 3px solid #1677ff;">概率与库存配置</h6>
                <div class="probability-config">
                    <div class="probability-item">
                        <div class="probability-label level-ssr">SSR（超稀有）</div>
                        <div>
                            <label class="form-label">抽取概率</label>
                            <input type="number" class="form-control" value="2" style="width: 100px; display: inline-block;">
                            <span class="text-muted">%</span>
                        </div>
                        <div>
                            <label class="form-label">库存总量</label>
                            <input type="number" class="form-control" value="100" style="width: 100px; display: inline-block;">
                            <span class="text-muted">张（-1 表示不限量）</span>
                        </div>
                    </div>
                    <div class="probability-item">
                        <div class="probability-label level-sr">SR（稀有）</div>
                        <div>
                            <label class="form-label">抽取概率</label>
                            <input type="number" class="form-control" value="18" style="width: 100px; display: inline-block;">
                            <span class="text-muted">%</span>
                        </div>
                        <div>
                            <label class="form-label">库存总量</label>
                            <input type="number" class="form-control" value="500" style="width: 100px; display: inline-block;">
                            <span class="text-muted">张</span>
                        </div>
                    </div>
                    <div class="probability-item">
                        <div class="probability-label level-r">R（普通）</div>
                        <div>
                            <label class="form-label">抽取概率</label>
                            <input type="number" class="form-control" value="80" style="width: 100px; display: inline-block;">
                            <span class="text-muted">%</span>
                        </div>
                        <div>
                            <label class="form-label">库存总量</label>
                            <input type="text" class="form-control" value="-1" style="width: 100px; display: inline-block;">
                            <span class="text-muted">不限量</span>
                        </div>
                    </div>
                    <div style="margin-top: 16px; padding: 12px; background: white; border-radius: 6px;">
                        <strong>概率总和：</strong><span style="color: #52c41a;">100%</span> ✅
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-6">
                        <label class="form-label"><span class="text-danger">*</span> 10 连抽必中等级</label>
                        <select class="form-select">
                            <option>SR（稀有）</option>
                            <option>SSR（超稀有）</option>
                        </select>
                        <small class="text-muted">用户 10 连抽必中该等级或以上</small>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h6 style="font-weight: 600; margin-bottom: 16px; color: #333; padding-left: 12px; border-left: 3px solid #1677ff;">图片库管理</h6>
                <div class="upload-area">
                    <div style="font-size: 48px; margin-bottom: 12px;">📤</div>
                    <div style="color: #666; font-size: 14px;">拖拽图片到此处，或点击上传</div>
                    <small class="text-muted" style="display: block; margin-top: 8px;">支持 JPG、PNG 格式，建议尺寸 800x800px</small>
                </div>
                <div class="image-grid">
                    <div class="image-item selected">
                        <div class="image-item-bg" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">🎭</div>
                        <div class="image-level-badge level-ssr">SSR</div>
                    </div>
                    <div class="image-item">
                        <div class="image-item-bg" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">⚡</div>
                        <div class="image-level-badge level-sr">SR</div>
                    </div>
                    <div class="image-item">
                        <div class="image-item-bg" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">🌸</div>
                        <div class="image-level-badge level-r">R</div>
                    </div>
                    <div class="image-item">
                        <div class="image-item-bg" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">🎨</div>
                        <div class="image-level-badge level-r">R</div>
                    </div>
                    <div class="image-item">
                        <div class="image-item-bg" style="background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);">🎪</div>
                        <div class="image-level-badge level-sr">SR</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 页面导航函数
        function navigateToPage(pageUrl) {
            window.parent.postMessage({
                type: 'PAGE_NAVIGATION',
                page: pageUrl
            }, '*');
        }
    </script>
</body>
</html>
