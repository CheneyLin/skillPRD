<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 主题包列表 - 电子吧唧 2 期</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/app_styles.css" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0;">
    <!-- IP 主题包列表页 -->
    <div id="app_ip_list" class="phone-frame" style="width: 100%; height: 100vh; border: none; border-radius: 0;">
        <div class="phone-notch"></div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <span>9:41</span>
            <div class="flex items-center gap-1">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>
        
        <!-- 页面内容 -->
        <div class="page-content">
            <!-- 导航栏 -->
            <div class="nav-bar">
                <div class="nav-title">IP 主题包</div>
                <div class="nav-action">
                    <i class="fas fa-search"></i>
                </div>
            </div>
            
            <!-- 排序标签 -->
            <div class="flex gap-2 px-4 py-3 bg-white border-b border-gray-200">
                <button class="px-4 py-1.5 bg-purple-500 text-white rounded-full text-sm font-medium">热门</button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 rounded-full text-sm">新品</button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 rounded-full text-sm">即将结束</button>
            </div>
            
            <!-- IP 包列表 -->
            <div class="p-4 pb-20">
                <!-- IP 包卡片 1 -->
                <div class="card mb-3 cursor-pointer" onclick="navigateToPage('ip_detail.html')">
                    <div class="relative">
                        <div class="w-full h-40 bg-gradient-to-br from-purple-400 to-pink-400 rounded-lg flex items-center justify-center">
                            <i class="fas fa-dragon text-6xl text-white"></i>
                        </div>
                        <div class="absolute top-2 left-2">
                            <span class="tag tag-hot">热门</span>
                        </div>
                    </div>
                    <div class="mt-3">
                        <h3 class="font-bold text-lg text-gray-800">火影忍者</h3>
                        <p class="text-sm text-gray-500 mt-1">包含 20 张图片</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-red-500 font-bold">¥9.9 起</span>
                            <span class="text-xs text-gray-400">已有 1.2k 人抽选</span>
                        </div>
                    </div>
                </div>
                
                <!-- IP 包卡片 2 -->
                <div class="card mb-3 cursor-pointer" onclick="navigateToPage('ip_detail.html')">
                    <div class="relative">
                        <div class="w-full h-40 bg-gradient-to-br from-blue-400 to-cyan-400 rounded-lg flex items-center justify-center">
                            <i class="fas fa-ghost text-6xl text-white"></i>
                        </div>
                        <div class="absolute top-2 left-2">
                            <span class="tag tag-new">新品</span>
                        </div>
                    </div>
                    <div class="mt-3">
                        <h3 class="font-bold text-lg text-gray-800">鬼灭之刃</h3>
                        <p class="text-sm text-gray-500 mt-1">包含 18 张图片</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-red-500 font-bold">¥9.9 起</span>
                            <span class="text-xs text-gray-400">已有 856 人抽选</span>
                        </div>
                    </div>
                </div>
                
                <!-- IP 包卡片 3 -->
                <div class="card mb-3 cursor-pointer" onclick="navigateToPage('ip_detail.html')">
                    <div class="relative">
                        <div class="w-full h-40 bg-gradient-to-br from-orange-400 to-red-400 rounded-lg flex items-center justify-center">
                            <i class="fas fa-fire text-6xl text-white"></i>
                        </div>
                        <div class="absolute top-2 left-2">
                            <span class="tag tag-ending">即将结束</span>
                        </div>
                    </div>
                    <div class="mt-3">
                        <h3 class="font-bold text-lg text-gray-800">海贼王</h3>
                        <p class="text-sm text-gray-500 mt-1">包含 25 张图片</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-red-500 font-bold">¥9.9 起</span>
                            <span class="text-xs text-gray-400">已有 2.3k 人抽选</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 底部 TabBar -->
            <div class="tab-bar">
                <div class="tab-item active">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </div>
                <div class="tab-item" onclick="navigateToPage('badge_gallery.html')">
                    <i class="fas fa-images"></i>
                    <span>我的图库</span>
                </div>
                <div class="tab-item">
                    <i class="fas fa-user"></i>
                    <span>我的</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/app_scripts.js"></script>
    <script>
        // 页面内导航函数（用于 iframe 环境）
        function navigateToPage(pageUrl) {
            // 向父窗口发送消息，请求切换页面
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'PAGE_NAVIGATION',
                    page: pageUrl
                }, '*');
            } else {
                // 如果不是在 iframe 中，直接跳转
                window.location.href = pageUrl;
            }
        }
    </script>
</body>
</html>
