<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 连抽 - 电子吧唧 2 期</title>
    <link href="../../assets/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/app_styles.css" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0;">
    <div id="app_ten_draw" class="phone-frame">
        <div class="phone-notch"></div>
        <div class="status-bar">
            <span>9:41</span>
            <div class="flex items-center gap-1">
                <i class="bi bi-reception-4"></i>
                <i class="bi bi-wifi"></i>
                <i class="bi bi-battery-full"></i>
            </div>
        </div>
        <div class="page-content">
            <div class="nav-bar">
                <div class="nav-back cursor-pointer" onclick="navigateToPage('ip_detail.html')"><i class="bi bi-chevron-left"></i></div>
                <div class="nav-title">10 连抽</div>
                <div class="nav-action"></div>
            </div>
            <div class="p-4 content-with-tabbar">
                <div class="text-center mb-4">
                    <h3 class="card-title">恭喜获得 10 张图片</h3>
                    <p class="caption mt-1">必中 1 张 SR 及以上</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="image-card relative">
                        <div class="w-full h-full flex items-center justify-center" style="background: linear-gradient(135deg, #ffd700, #ffed4e);">
                            <i class="bi bi-star-fill text-4xl" style="color: var(--geist-white);"></i>
                        </div>
                        <div class="image-level-tag"><span class="badge-ssr">SSR</span></div>
                        <div class="absolute bottom-2 left-2 px-2 py-1.5 text-white text-xs rounded" style="background: var(--ship-red);">保底</div>
                    </div>
                    <div class="image-card relative">
                        <div class="w-full h-full flex items-center justify-center" style="background: linear-gradient(135deg, #c0c0c0, #e8e8e8);">
                            <i class="bi bi-star-fill text-4xl" style="color: var(--geist-white);"></i>
                        </div>
                        <div class="image-level-tag"><span class="badge-sr">SR</span></div>
                    </div>
                    <div class="image-card relative">
                        <div class="w-full h-full flex items-center justify-center" style="background: var(--geist-gray-100);">
                            <i class="bi bi-image text-4xl" style="color: var(--geist-gray-400);"></i>
                        </div>
                        <div class="image-level-tag"><span class="badge-r">R</span></div>
                    </div>
                    <div class="image-card relative">
                        <div class="w-full h-full flex items-center justify-center" style="background: var(--geist-gray-100);">
                            <i class="bi bi-image text-4xl" style="color: var(--geist-gray-400);"></i>
                        </div>
                        <div class="image-level-tag"><span class="badge-r">R</span></div>
                    </div>
                    <div class="image-card relative">
                        <div class="w-full h-full flex items-center justify-center" style="background: var(--geist-gray-100);">
                            <i class="bi bi-image text-4xl" style="color: var(--geist-gray-400);"></i>
                        </div>
                        <div class="image-level-tag"><span class="badge-r">R</span></div>
                    </div>
                    <div class="image-card relative">
                        <div class="w-full h-full flex items-center justify-center" style="background: var(--geist-gray-100);">
                            <i class="bi bi-image text-4xl" style="color: var(--geist-gray-400);"></i>
                        </div>
                        <div class="image-level-tag"><span class="badge-r">R</span></div>
                    </div>
                </div>
                <div class="mt-6">
                    <button class="btn-primary" onclick="showDrawResult('ten')">查看结果详情</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗: 抽选结算 -->
    <div id="draw_result_modal" class="modal-overlay">
        <div class="modal-content">
            <div class="text-center mb-4">
                <h3 class="sub-heading">恭喜获得！</h3>
                <p class="body-small mt-1">已获得新吧唧图片</p>
            </div>
            <div class="flex justify-center mb-4">
                <div class="w-32 h-32 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #ffd700, #ffed4e);">
                    <i class="bi bi-emoji-smile text-5xl" style="color: var(--geist-white);"></i>
                </div>
            </div>
            <div class="text-center mb-4">
                <span class="badge-ssr">SSR</span>
                <h4 class="card-title mt-2">鸣人</h4>
                <p class="caption mt-1">火影忍者系列</p>
            </div>
            <div class="space-y-2">
                <button class="btn-primary" onclick="closeModal(); navigateToPage('badge_gallery.html')">去查看</button>
                <button class="btn-secondary" onclick="closeModal()">继续抽选</button>
            </div>
        </div>
    </div>

    <script>
        function navigateToPage(pageUrl) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'PAGE_NAVIGATION', page: pageUrl }, '*');
            } else {
                window.location.href = pageUrl;
            }
        }

        function showDrawResult(type) {
            const modal = document.getElementById('draw_result_modal');
            if (modal) {
                modal.classList.add('show');
            }
        }

        function closeModal() {
            const modal = document.getElementById('draw_result_modal');
            if (modal) {
                modal.classList.remove('show');
            }
        }
    </script>
</body>
</html>
